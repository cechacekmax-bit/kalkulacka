<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulačka</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 50px;
}

h1 {
    font-size: 40px;
    margin-bottom: 20px;
}

.kalkulacka {
    background-color: #808080;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0px 0px 15px rgba(0,0,0,0.3);
    width: 320px;
}

#display {
    width: 100%;
    height: 60px;
    font-size: 28px;
    text-align: right;
    margin-bottom: 15px;
    padding-right: 10px;
    box-sizing: border-box;
}

.tlacitka {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    height: 60px;
    font-size: 22px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
}

button:hover {
    opacity: 0.9;
}

.paticka {
    margin-top: 20px;
    font-size: 16px;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>Židovské počítadlo</h1>

<div class="kalkulacka">
    <input type="text" id="display" readonly>

    <div class="tlacitka">
        <button onclick="vymazat()">C</button>
        <button onclick="pridat('%')">%</button>
        <button onclick="pridat('/')">÷</button>
        <button onclick="pridat('*')">×</button>

        <button onclick="pridat('7')">7</button>
        <button onclick="pridat('8')">8</button>
        <button onclick="pridat('9')">9</button>
        <button onclick="pridat('-')">−</button>

        <button onclick="pridat('4')">4</button>
        <button onclick="pridat('5')">5</button>
        <button onclick="pridat('6')">6</button>
        <button onclick="pridat('+')">+</button>

        <button onclick="pridat('1')">1</button>
        <button onclick="pridat('2')">2</button>
        <button onclick="pridat('3')">3</button>
        <button onclick="vypocet()" rowspan="2">=</button>

        <button onclick="pridat('0')">0</button>
        <button onclick="pridat('.')">.</button>
    </div>
</div>

<div class="paticka">
    Made by Sígr from Havlíčkova
</div>

<script>
function pridat(hodnota) {
    document.getElementById("display").value += hodnota;
}

function vymazat() {
    document.getElementById("display").value = "";
}

function vypocet() {
    try {
        let vyraz = document.getElementById("display").value;
        let vysledek = eval(vyraz);
        document.getElementById("display").value = vysledek;
    } catch {
        document.getElementById("display").value = "Chyba";
    }
}
</script>

</body>
</html>
